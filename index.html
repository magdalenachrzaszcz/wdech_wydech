<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wdech. Wydech... 🌴</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Oficjalna paleta eTutor / Tutore */
            --etutor-orange: #FF5A00;
            --etutor-magenta: #F72585;
            --etutor-purple: #560062;
            --bg-purple: #9674A7; /* Twój wybrany fioletowy kolor tła */
            --white: #ffffff;
        }
        
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-purple);
            /* Tło z filtrem fioletowym nałożonym na zdjęcie plaży */
            background-image: linear-gradient(rgba(150, 116, 167, 0.7), rgba(150, 116, 167, 0.7)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 550px;
            width: 100%;
            padding: 45px 35px;
            background: rgba(29, 29, 78, 0.85); /* Ciemny granat z przezroczystością */
            backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Sekcja na 3 logo obok siebie */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .logo-wrapper img {
            max-width: 100px;
            height: auto;
            object-fit: contain;
        }

        h1 { 
            font-size: 2.8rem; 
            margin-bottom: 15px; 
            font-weight: 800;
            line-height: 1.1;
            background: linear-gradient(to right, var(--etutor-orange), var(--etutor-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { 
            font-size: 1.1rem; 
            margin-bottom: 40px; 
            font-weight: 300;
            line-height: 1.6;
            opacity: 0.95;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: var(--white);
            /* Gradient od pomarańczu do fioletu */
            background: linear-gradient(45deg, var(--etutor-orange), var(--etutor-purple));
            padding: 16px 25px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: none;
            box-shadow: 0 4px 15px rgba(255, 90, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
            box-shadow: 0 10px 20px rgba(86, 0, 98, 0.4);
        }

        .footer { 
            margin-top: 40px; 
            font-size: 0.95rem; 
            font-weight: 300;
            line-height: 1.6;
        }

        .footer a { 
            color: var(--etutor-orange); 
            text-decoration: none; 
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-wrapper">
        <img src="logo.png" alt="Logo Tutore">
        <img src="logo2.png" alt="Logo ProfiLingua">
        <img src="logo3.png" alt="Logo eTutor">
    </div>
    
    <h1>Wdech. Wydech. 🌴</h1>
    <p>Świat się nie zawali, jeśli na chwilę staniesz w miejscu.<br>To Twój czas na oddech.</p>

    <div class="btn-group">
        <a href="https://www.youtube.com/watch?v=PY_N9LidM_Q" target="_blank" class="btn">🌊 Szum morza</a>
        <a href="https://www.youtube.com/watch?v=MInZ0qI8TTo" target="_blank" class="btn">🎧 Soundhealing</a>
        <a href="https://www.youtube.com/results?search_query=spanish+summer+hits" target="_blank" class="btn">💃 Hiszpańska Energia</a>
    </div>

    <div class="footer">
        Dziękuję za wspólne 9 lat z ProfiLingua. 🧡<br><br>
        <a href="https://www.linkedin.com/in/magdalenachrzaszcz" target="_blank">Zostańmy w kontakcie na LinkedIn</a>
    </div>
</div>

</body>
</html>
