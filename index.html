<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odpoczynek... 🌴</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --o: #FF5A00; --p: #560062; --bg: #9674A7; }
        body { margin: 0; padding: 20px; font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; color: white; text-align: center; box-sizing: border-box; }
        .c { max-width: 500px; width: 100%; padding: 40px 30px; background: rgba(29, 29, 78, 0.9); backdrop-filter: blur(15px); border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .logo { max-width: 160px; margin-bottom: 25px; }
        h1 { font-size: 2.5rem; margin-bottom: 15px; font-weight: 800; background: linear-gradient(to right, var(--o), #F72585); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn { text-decoration: none; color: white; background: linear-gradient(45deg, var(--o), var(--p)); padding: 15px; border-radius: 50px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .footer { margin-top: 40px; font-size: 0.9rem; font-weight: 300; }
        .footer a { color: var(--o); text-decoration: none; font-weight: 500; }
    </style>
</head>
