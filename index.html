<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wdech. Wydech... 🌴</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF5A00; --magenta: #F72585; --purple: #560062;
            --bg: #9674A7; --white: #ffffff;
        }
        body {
            margin: 0; padding: 40px 20px; font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            background-image: linear-gradient(rgba(150, 116, 167, 0.7), rgba(150, 116, 167, 0.7)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; align-items: center; justify-content: center; min-height: 100vh; box-sizing: border-box;
        }
        .container {
            max-width: 550px; width: 100%; padding: 45px 35px;
            background: rgba(29, 29, 78, 0.85); backdrop-filter: blur(15px);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; color: white;
        }
        .logo-wrapper { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .logo-wrapper img { max-width: 100px; height: auto; }
        h1 { 
            font-size: 2.8rem; font-weight: 800; margin-bottom: 15px;
            background: linear-gradient(to right, var(--orange), var(--magenta));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        p { font-size: 1.1rem; margin-bottom: 40px; font-weight: 300; line-height: 1.6; }
        .btn {
            text-decoration: none; color: white; display: flex; align-items: center; justify-content: center; gap: 12px;
            background: linear-gradient(45deg, var(--orange), var(--purple));
            padding: 16px 25px; border-radius: 50px; margin-bottom: 15px; transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .footer { margin-top: 40px; font-size: 0.95rem; font-weight: 300; }
        .footer a { color: var(--orange); text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo-wrapper">
        <img src="logo.png" alt="Logo 1">
        <img src="logo2.png" alt="Logo 2">
        <img src="logo3.png" alt="Logo 3">
    </div>
    <h1>Wdech. Wydech. 🌴</h1>
    <p>Świat się nie zawali, jeśli na chwilę staniesz w miejscu.<br>To Twój czas na oddech.</p>

    </div>
